<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>#7 — History Detail: Light Back Button</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1814;
    --text: #e8e0d4;
    --textSecondary: rgba(255,255,255,0.45);
    --textTertiary: rgba(255,255,255,0.28);
    --card: rgba(255,255,255,0.035);
    --cardBorder: rgba(255,255,255,0.08);
    --accent1: #5ebaa9;
    --surfaceSoft: rgba(255,255,255,0.025);
    --metricCalories: #e8a55a;
    --metricProtein: #6cb4ee;
    --metricHydration: #5ebaa9;
    --metricNutrition: #c4a46c;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    max-width: 390px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 50px 20px 40px;
    -webkit-font-smoothing: antialiased;
  }

  .theme-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--cardBorder);
    color: var(--textSecondary);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .version-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--textTertiary);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  .divider {
    border: none;
    border-top: 1px dashed var(--cardBorder);
    margin: 28px 0;
  }

  /* ─── Header row ─── */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .page-title {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.8px;
    flex: 1;
    margin-right: 12px;
  }

  /* ─── Old back button (pill) ─── */
  .back-pill {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    min-width: 74px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--cardBorder);
    background: var(--surfaceSoft);
    font-size: 12px;
    color: var(--textSecondary);
    cursor: pointer;
  }

  /* ─── New back button (light) ─── */
  .back-light {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 6px 0;
    cursor: pointer;
    flex-shrink: 0;
  }
  .back-light .chevron {
    font-size: 18px;
    color: var(--accent1);
    line-height: 1;
  }
  .back-light .label {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent1);
  }

  /* ─── Summary card ─── */
  .card {
    background: var(--card);
    border: 1px solid var(--cardBorder);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .score-row {
    display: flex;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .score-hero {
    font-size: 48px;
    font-weight: 300;
    letter-spacing: -2.4px;
    line-height: 52px;
    color: var(--accent1);
    margin-right: 6px;
  }
  .score-max {
    font-size: 14px;
    color: var(--textSecondary);
  }
  .metric-grid {
    display: flex;
    flex-wrap: wrap;
    column-gap: 12px;
    row-gap: 12px;
  }
  .metric-item {
    min-width: 45%;
  }
  .metric-label {
    font-size: 11px;
    font-weight: 500;
  }
  .metric-value {
    font-size: 14px;
    margin-top: 2px;
  }

  /* Light theme */
  body.light {
    --bg: #ece7df;
    --text: #2a2520;
    --textSecondary: rgba(42,37,32,0.56);
    --textTertiary: rgba(42,37,32,0.38);
    --card: rgba(255,255,255,0.8);
    --cardBorder: rgba(68,55,37,0.12);
    --accent1: #3a9e8a;
    --surfaceSoft: rgba(255,255,255,0.82);
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="document.body.classList.toggle('light'); this.textContent = document.body.classList.contains('light') ? '&#9684; Dark' : '&#9684; Light'">&#9684; Light</button>

<!-- ═══════════ BEFORE ═══════════ -->
<div class="version-label">Before — pill back button</div>

<div class="header-row">
  <h1 class="page-title">Apr 2, 2026</h1>
  <button class="back-pill">Back</button>
</div>

<div class="card">
  <div class="score-row">
    <span class="score-hero">72</span>
    <span class="score-max">/ 100</span>
  </div>
  <div class="metric-grid">
    <div class="metric-item">
      <div class="metric-label" style="color:var(--metricCalories)">Calories</div>
      <div class="metric-value">1,840 kcal</div>
    </div>
    <div class="metric-item">
      <div class="metric-label" style="color:var(--metricProtein)">Protein</div>
      <div class="metric-value">128g</div>
    </div>
    <div class="metric-item">
      <div class="metric-label" style="color:var(--metricHydration)">Hydration</div>
      <div class="metric-value">6.5 cups</div>
    </div>
    <div class="metric-item">
      <div class="metric-label" style="color:var(--metricNutrition)">Nutrition</div>
      <div class="metric-value">61%</div>
    </div>
  </div>
</div>

<hr class="divider">

<!-- ═══════════ AFTER ═══════════ -->
<div class="version-label">After — light chevron + text</div>

<div class="header-row">
  <h1 class="page-title">Apr 2, 2026</h1>
  <div class="back-light">
    <span class="chevron">&#8249;</span>
    <span class="label">Back</span>
  </div>
</div>

<div class="card">
  <div class="score-row">
    <span class="score-hero">72</span>
    <span class="score-max">/ 100</span>
  </div>
  <div class="metric-grid">
    <div class="metric-item">
      <div class="metric-label" style="color:var(--metricCalories)">Calories</div>
      <div class="metric-value">1,840 kcal</div>
    </div>
    <div class="metric-item">
      <div class="metric-label" style="color:var(--metricProtein)">Protein</div>
      <div class="metric-value">128g</div>
    </div>
    <div class="metric-item">
      <div class="metric-label" style="color:var(--metricHydration)">Hydration</div>
      <div class="metric-value">6.5 cups</div>
    </div>
    <div class="metric-item">
      <div class="metric-label" style="color:var(--metricNutrition)">Nutrition</div>
      <div class="metric-value">61%</div>
    </div>
  </div>
</div>

</body>
</html>
