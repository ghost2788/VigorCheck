<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#2 — Home: Bump Insight Text to md</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1814;
    --text: #e8e0d4;
    --textSecondary: rgba(255,255,255,0.45);
    --textTertiary: rgba(255,255,255,0.28);
    --card: rgba(255,255,255,0.035);
    --cardBorder: rgba(255,255,255,0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    padding: 50px 20px 40px;
    -webkit-font-smoothing: antialiased;
  }

  .theme-toggle {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    background: var(--card);
    border: 1px solid var(--cardBorder);
    color: var(--textSecondary);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 11px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .version-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--textTertiary);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  .divider {
    border: none;
    border-top: 1px dashed var(--cardBorder);
    margin: 28px 0;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--cardBorder);
    border-radius: 20px;
    padding: 16px;
    padding-top: 14px;
    padding-bottom: 14px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--textTertiary);
    margin-bottom: 6px;
  }

  .insight-sm {
    font-size: 14px;
    font-weight: 500;
    line-height: 20px;
  }

  .insight-md {
    font-size: 15px;
    font-weight: 500;
    line-height: 22px;
  }

  body.light {
    --bg: #ece7df;
    --text: #2a2520;
    --textSecondary: rgba(42,37,32,0.56);
    --textTertiary: rgba(42,37,32,0.38);
    --card: rgba(255,255,255,0.8);
    --cardBorder: rgba(68,55,37,0.12);
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="document.body.classList.toggle('light'); this.textContent = document.body.classList.contains('light') ? '&#9684; Dark' : '&#9684; Light'">&#9684; Light</button>

<!-- ═══════════ BEFORE ═══════════ -->
<div class="version-label">Before — size sm (14px)</div>

<div class="card">
  <div class="eyebrow">Today at a glance</div>
  <div class="insight-sm">You're on pace with calories but protein is lagging — try adding a high-protein snack this afternoon.</div>
</div>

<hr class="divider">

<!-- ═══════════ AFTER ═══════════ -->
<div class="version-label">After — size md (15px)</div>

<div class="card">
  <div class="eyebrow">Today at a glance</div>
  <div class="insight-md">You're on pace with calories but protein is lagging — try adding a high-protein snack this afternoon.</div>
</div>

</body>
</html>
