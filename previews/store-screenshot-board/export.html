<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, initial-scale=1.0" />
    <title>VigorCheck Store Screenshot Export</title>
    <style>
      :root {
        --bg: #14120f;
        --bg-deep: #0f0d0a;
        --panel: #1d1a16;
        --panel-soft: #221f1a;
        --border: rgba(255, 255, 255, 0.08);
        --text: #f4f0ea;
        --muted: #c6beb3;
        --amber: #d19a52;
        --amber-soft: rgba(209, 154, 82, 0.2);
        --mint: #8be2cf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        width: 100%;
      }

      body {
        background: #100e0c;
        color: var(--text);
        font-family: "Segoe UI", Inter, Arial, sans-serif;
      }

      #slide {
        height: 1920px;
        margin: 0 auto;
        position: relative;
        width: 1080px;
      }

      .poster-slide {
        background:
          radial-gradient(circle at 22% 18%, rgba(209, 154, 82, 0.26), transparent 26%),
          radial-gradient(circle at 76% 78%, rgba(139, 226, 207, 0.08), transparent 18%),
          linear-gradient(180deg, rgba(19, 17, 14, 0.92), rgba(12, 10, 8, 0.98)),
          linear-gradient(135deg, #181511, #0d0b09);
        padding: 112px 88px 92px;
      }

      .clean-slide {
        background:
          radial-gradient(circle at top left, rgba(209, 154, 82, 0.12), transparent 32%),
          radial-gradient(circle at bottom right, rgba(139, 226, 207, 0.07), transparent 20%),
          linear-gradient(180deg, #16130f, #0f0d0a);
        padding: 90px 76px 88px;
      }

      .brandline {
        color: var(--amber);
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.18em;
        margin-bottom: 26px;
        text-transform: uppercase;
      }

      .topline {
        color: var(--amber);
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.18em;
        margin-bottom: 26px;
        text-transform: uppercase;
      }

      .poster-headline {
        font-size: 110px;
        font-weight: 320;
        letter-spacing: -0.06em;
        line-height: 0.88;
        margin: 0 0 24px;
        max-width: 720px;
      }

      .poster-subhead {
        color: #ddd5ca;
        font-size: 40px;
        line-height: 1.28;
        margin: 0;
        max-width: 720px;
      }

      .poster-body {
        align-items: flex-start;
        display: flex;
        justify-content: center;
        margin-top: 96px;
      }

      .clean-tag {
        color: var(--amber);
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.16em;
        margin-bottom: 22px;
        text-transform: uppercase;
      }

      .clean-headline {
        font-size: 88px;
        font-weight: 320;
        letter-spacing: -0.055em;
        line-height: 0.92;
        margin: 0 0 20px;
        max-width: 860px;
      }

      .clean-subhead {
        color: var(--muted);
        font-size: 34px;
        line-height: 1.32;
        margin: 0 0 34px;
        max-width: 840px;
      }

      .clean-phone-wrap {
        align-items: flex-start;
        display: flex;
        height: 1460px;
        justify-content: center;
        padding-top: 24px;
      }

      .phone-shell {
        background: linear-gradient(180deg, #595146, #231d17);
        border-radius: 54px;
        box-shadow:
          0 36px 90px rgba(0, 0, 0, 0.44),
          0 0 0 1px rgba(255, 255, 255, 0.12) inset,
          0 0 42px rgba(255, 215, 168, 0.06);
        padding: 14px;
        position: relative;
      }

      .poster-slide .phone-shell {
        background: linear-gradient(180deg, #665847, #2b2118);
        box-shadow:
          0 40px 100px rgba(0, 0, 0, 0.5),
          0 0 0 1px rgba(255, 255, 255, 0.14) inset,
          0 0 120px rgba(209, 154, 82, 0.16);
      }

      .phone {
        aspect-ratio: 9 / 19.5;
        background: #000;
        border-radius: 40px;
        overflow: hidden;
        position: relative;
        width: var(--phone-width, 392px);
      }

      .phone::before {
        background: rgba(0, 0, 0, 0.82);
        border-radius: 0 0 20px 20px;
        content: "";
        height: 28px;
        left: 50%;
        position: absolute;
        top: 0;
        transform: translateX(-50%);
        width: 34%;
        z-index: 2;
      }

      .phone img {
        display: block;
        height: 100%;
        object-fit: cover;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main id="slide"></main>
    <script>
      const slides = {
        1: {
          type: "poster",
          image: "./images/dashboard.jpg",
          brandline: "VigorCheck",
          headline: "Hit your daily targets",
          subhead: "See calories, protein, hydration, and nutrition in one daily score.",
          phoneWidth: 500,
        },
        2: {
          type: "poster",
          image: "./images/welcome.jpg",
          brandline: "VigorCheck",
          headline: "A better way to track nutrition",
          subhead: "Start with a personalized plan built around your goals.",
          phoneWidth: 500,
        },
        3: {
          type: "clean",
          image: "./images/log.jpg",
          tag: "Fast logging",
          headline: "Log meals in seconds",
          subhead: "Scan, type, or quick add without breaking your day.",
          phoneWidth: 500,
        },
        4: {
          type: "clean",
          image: "./images/review.jpg",
          tag: "AI review",
          headline: "Review AI-drafted meals before saving",
          subhead: "Adjust meal type, portions, and prep details before anything is logged.",
          phoneWidth: 500,
        },
        5: {
          type: "clean",
          image: "./images/trends.jpg",
          tag: "Weekly trends",
          headline: "Track weekly momentum",
          subhead: "See your weekly score and spot trends across calories, protein, hydration, and nutrition.",
          phoneWidth: 500,
        },
        6: {
          type: "clean",
          image: "./images/nutrients.jpg",
          tag: "Nutrient depth",
          headline: "Go beyond calories",
          subhead: "See vitamin and mineral coverage, not just macros.",
          phoneWidth: 500,
        },
      };

      const params = new URLSearchParams(window.location.search);
      const key = params.get("slide") || "1";
      const slide = slides[key] || slides["1"];
      const root = document.getElementById("slide");

      if (slide.type === "poster") {
        root.className = "poster-slide";
        root.innerHTML = `
          <div class="brandline">${slide.brandline}</div>
          <h1 class="poster-headline">${slide.headline}</h1>
          <p class="poster-subhead">${slide.subhead}</p>
          <section class="poster-body">
            <div class="phone-shell ${slide.phoneShellClass || ""}">
              <div class="phone" style="--phone-width:${slide.phoneWidth || 392}px">
                <img src="${slide.image}" alt="" />
              </div>
            </div>
          </section>
        `;
      } else {
        root.className = "clean-slide";
        root.innerHTML = `
          <div class="clean-tag">${slide.tag}</div>
          <h1 class="clean-headline">${slide.headline}</h1>
          <p class="clean-subhead">${slide.subhead}</p>
          <section class="clean-phone-wrap">
            <div class="phone-shell ${slide.phoneShellClass || ""}">
              <div class="phone" style="--phone-width:${slide.phoneWidth || 392}px">
                <img src="${slide.image}" alt="" />
              </div>
            </div>
          </section>
        `;
      }
    </script>
  </body>
</html>
